{{- $id := delimit (shuffle (seq 1 9999)) "" -}}
<span class="sidenote-wrapper">
  <label for="sn-{{ $id }}" class="sidenote-toggle sidenote-number"></label>
  <input type="checkbox" id="sn-{{ $id }}" class="sidenote-toggle-input" />
  <span class="sidenote">{{ .Inner | markdownify }}</span>
</span>
