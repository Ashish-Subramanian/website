{{ define "main" }}
<article class="page">
  <header class="page-header">
    <h1>{{ .Title }}</h1>
    {{ if .Date.IsZero | not }}
      <time class="page-date" datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
    {{ end }}
  </header>
  <div class="page-body">
    {{ .Content }}
  </div>
</article>
{{ end }}
